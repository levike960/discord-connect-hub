{% extends "base.html" %}
{% block title %}Borászat{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-10">
    <div class="card shadow-sm">
      <div class="card-body text-center">
        <h2 class="card-title mb-4"><i class="bi bi-cup-straw"></i> Borászat</h2>
        <hr>
        <div class="py-5">
          <i class="bi bi-cup-straw fs-1 d-block mb-3" style="color: #722f37;"></i>
          <p class="text-muted fst-italic" style="min-height: 150px;">
            Ez a szekció hamarosan tartalommal bővül.
            <br>
            Itt olvashat majd a borainkról, szőlőfajtáinkról és borászati hagyományainkról.
          </p>
          <p class="text-muted">[Tartalom hamarosan]</p>
        </div>

        <a href="{{ url_for('fraction') }}" class="btn btn-outline-secondary mt-3">
          <i class="bi bi-arrow-left"></i> Vissza
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
