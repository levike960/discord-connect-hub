{% extends "base.html" %}
{% block title %}Profile{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body text-center">
        <img src="{{ current_user.avatar_url }}" alt="Avatar" class="avatar-lg mb-3">
        <h4>{{ current_user.display_name }}</h4>
        <p class="text-muted">Discord ID: {{ current_user.discord_id }}</p>
      </div>
    </div>

    <div class="card shadow-sm mt-4">
      <div class="card-body">
        <h5>Edit Profile</h5>
        <form method="POST" enctype="multipart/form-data">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

          <div class="mb-3">
            <label for="nickname" class="form-label">Nickname</label>
            <input type="text" class="form-control" id="nickname" name="nickname"
                   value="{{ current_user.nickname or '' }}"
                   placeholder="{{ current_user.username }}">
            <div class="form-text">Leave empty to use Discord username.</div>
          </div>

          <div class="mb-3">
            <label for="avatar" class="form-label">Custom Avatar</label>
            <input type="file" class="form-control" id="avatar" name="avatar"
                   accept="image/png,image/jpeg,image/gif,image/webp">
          </div>

          <button type="submit" class="btn btn-primary w-100">Save Changes</button>
        </form>
      </div>
    </div>

    <div class="text-center mt-3">
      <a href="{{ url_for('logout') }}" class="btn btn-outline-danger">Logout</a>
    </div>
  </div>
</div>
{% endblock %}
